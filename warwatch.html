<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISRAEL INTEL HUB | מרכז מודיעין לאומי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#020508;--panel:#04090f;--surf:#060d14;--surf2:#081219;
  --border:#0c1e2e;--accent:#00cfff;--green:#00ff88;--lime:#7fff00;
  --yellow:#ffdd00;--orange:#ff8800;--red:#ff2200;--crit:#ff003c;
  --text:#8ab0c4;--dim:#2a4060;--mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;}

/* SCANLINES */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9997;}

/* GRID BG */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.018) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

/* APP LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ── TOPBAR ── */
.topbar{background:rgba(2,5,8,0.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:500;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:16px;}

.logo{display:flex;align-items:center;gap:10px;}
.logo-radar{position:relative;width:38px;height:38px;flex-shrink:0;}
.lr-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,207,255,0.25);}
.lr-ring2{position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(0,207,255,0.12);}
.lr-sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,rgba(0,207,255,0.7) 40deg,transparent 40deg);animation:radar 2.5s linear infinite;}
.lr-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);}
@keyframes radar{to{transform:rotate(360deg);}}
.logo-txt h1{font-size:14px;font-weight:900;color:#fff;letter-spacing:-0.3px;}
.logo-txt .sub{font-size:8px;color:var(--accent);font-family:var(--mono);letter-spacing:2px;}

/* THREAT MATRIX */
.threat-matrix{display:flex;gap:12px;align-items:center;}
.tm-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.tm-flag{font-size:18px;line-height:1;}
.tm-name{font-size:8px;color:var(--dim);letter-spacing:0.5px;font-family:var(--mono);}
.tm-bar{width:32px;height:4px;border-radius:2px;background:var(--border);overflow:hidden;}
.tm-fill{height:100%;border-radius:2px;transition:width 1s;}
.tm-score{font-size:9px;font-family:var(--mono);font-weight:700;}

/* READINESS */
.readiness-compact{display:flex;align-items:center;gap:10px;}
.rc-label{font-size:9px;color:var(--dim);font-family:var(--mono);letter-spacing:1px;}
.rc-bars{display:flex;gap:2px;}
.rc-bar{width:16px;height:24px;border-radius:2px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);transition:all 0.5s;}
.rc-bar.lit-1{background:var(--green);box-shadow:0 0 6px var(--green);}
.rc-bar.lit-2{background:var(--lime);box-shadow:0 0 6px var(--lime);}
.rc-bar.lit-3{background:var(--yellow);box-shadow:0 0 6px var(--yellow);}
.rc-bar.lit-4{background:var(--orange);box-shadow:0 0 8px var(--orange);animation:blk 0.9s ease-in-out infinite;}
.rc-bar.lit-5{background:var(--crit);box-shadow:0 0 12px var(--crit);animation:blk 0.5s ease-in-out infinite;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0.35}}
.rc-score{font-family:var(--mono);font-size:20px;font-weight:900;transition:color 0.5s;}
.rc-level{font-size:10px;font-weight:700;transition:color 0.5s;white-space:nowrap;}

/* RIGHT */
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--green);font-weight:700;letter-spacing:1px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blk 1s ease-in-out infinite;}
.clock{font-family:var(--mono);font-size:16px;color:var(--accent);}
.btn{background:rgba(0,207,255,0.07);border:1px solid rgba(0,207,255,0.2);border-radius:5px;color:var(--accent);padding:5px 10px;font-size:10px;font-family:'Heebo',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn:hover{background:rgba(0,207,255,0.15);}
.btn.active{background:rgba(0,255,136,0.08);border-color:var(--green);color:var(--green);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn.danger{background:rgba(255,34,0,0.1);border-color:rgba(255,34,0,0.3);color:var(--red);}
.next-scan-lbl{font-size:8px;color:var(--dim);font-family:var(--mono);text-align:center;}

/* PROGRESS */
.prog-bar{height:2px;background:var(--border);position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green),var(--lime));width:0%;transition:width 0.2s;}

/* SOURCES ROW */
.sources-row{display:flex;align-items:center;gap:0;overflow-x:auto;border-top:1px solid var(--border);padding:4px 12px;gap:8px;scrollbar-width:none;}
.sources-row::-webkit-scrollbar{display:none;}
.src-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;border:1px solid;font-size:9px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;cursor:pointer;transition:all 0.15s;}
.src-chip:hover{opacity:0.8;}
.src-chip.off{border-color:rgba(255,255,255,0.07);color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.02);}
.src-chip.searching{animation:blk 0.7s ease-in-out infinite;}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* TICKER */
.ticker{background:rgba(255,50,0,0.05);border-bottom:1px solid rgba(255,50,0,0.12);display:none;align-items:center;height:24px;overflow:hidden;flex-shrink:0;}
.ticker.show{display:flex;}
.ticker-lbl{background:var(--crit);color:#fff;font-size:8px;font-weight:900;padding:0 8px;height:100%;display:flex;align-items:center;letter-spacing:1.5px;flex-shrink:0;}
.ticker-track{overflow:hidden;flex:1;}
.ticker-inner{display:flex;gap:50px;white-space:nowrap;animation:ticker 20s linear infinite;font-size:10px;color:#ff9090;font-family:var(--mono);}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* BODY */
.body-wrap{display:flex;flex:1;overflow:hidden;}

/* MAP */
#map{flex:1;background:#020508;}
.leaflet-tile-pane{filter:saturate(0.15) brightness(0.45) hue-rotate(175deg);}
.leaflet-control-zoom a{background:rgba(6,13,20,0.9)!important;color:var(--accent)!important;border-color:var(--border)!important;}

/* MAP LEGEND */
.map-legend{position:absolute;bottom:24px;left:12px;z-index:400;background:rgba(2,5,8,0.94);border:1px solid var(--border);border-radius:7px;padding:8px 12px;direction:rtl;pointer-events:none;}
.ml-title{font-size:8px;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px;font-family:var(--mono);}
.ml-row{display:flex;align-items:center;gap:7px;font-size:9px;margin-bottom:4px;}
.ml-dot{width:12px;height:12px;border-radius:2px;}

/* SIDEBAR */
.sidebar{width:290px;min-width:290px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.stabs{display:flex;border-bottom:1px solid var(--border);}
.stab{flex:1;padding:8px 0;text-align:center;font-size:9px;font-weight:700;letter-spacing:0.8px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tcontent{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.tcontent.active{display:flex;}
.tcontent::-webkit-scrollbar{width:2px;}
.tcontent::-webkit-scrollbar-thumb{background:var(--border);}

/* REGION ITEM */
.reg-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s;}
.reg-item:hover{background:rgba(255,255,255,0.02);}
.reg-color-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0;}
.reg-body{flex:1;min-width:0;}
.reg-name{font-size:12px;font-weight:700;color:#fff;}
.reg-note{font-size:9px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reg-prog{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.reg-prog-fill{height:100%;border-radius:2px;transition:width 1s;}
.reg-score{font-family:var(--mono);font-size:16px;font-weight:900;text-align:left;flex-shrink:0;}

/* ALERT ITEM */
.al-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);border-right:2px solid;animation:slide-al 0.25s ease;}
@keyframes slide-al{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.al-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px;}
.al-src{border-radius:7px;padding:1px 6px;font-size:8px;font-weight:700;letter-spacing:0.4px;}
.al-time{font-family:var(--mono);font-size:8px;color:var(--dim);}
.al-title{font-size:11px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:3px;}
.al-body{font-size:10px;color:var(--text);line-height:1.5;margin-bottom:5px;}
.al-foot{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.ew-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,136,0,0.13);border:1px solid rgba(255,136,0,0.3);border-radius:7px;padding:1px 6px;font-size:8px;color:var(--orange);font-weight:700;animation:blk 1.5s ease-in-out infinite;}
.conf-wrap{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--dim);}
.conf-bar{width:30px;height:2px;background:var(--border);border-radius:1px;}
.conf-fill{height:100%;border-radius:1px;background:var(--accent);}
.tag-mini{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:2px;padding:1px 4px;font-size:8px;color:var(--dim);}

/* DIPLOMATIC PANEL */
.diplo-country{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);}
.dc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.dc-flag{font-size:20px;}
.dc-name{font-size:12px;font-weight:700;color:#fff;}
.dc-rel{font-size:9px;font-weight:700;border-radius:6px;padding:2px 8px;border:1px solid;}
.dc-status{font-size:10px;color:var(--text);line-height:1.5;margin-bottom:5px;}
.dc-trend{display:flex;align-items:center;gap:6px;font-size:9px;}
.dc-trend-arrow{font-size:14px;}
.trend-up{color:var(--red);}
.trend-stable{color:var(--dim);}
.trend-down{color:var(--green);}

/* TRAJ */
.traj-card{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);}
.tc-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tc-type{font-size:11px;font-weight:700;color:var(--orange);}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:9px;}
.tcg-k{color:var(--dim);}
.tcg-v{color:#fff;font-family:var(--mono);}

/* FLASH BANNER */
#flash{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:9999;display:none;
background:rgba(2,5,8,0.97);border:2px solid var(--orange);border-radius:10px;padding:12px 18px;
min-width:340px;max-width:520px;box-shadow:0 0 40px rgba(255,136,0,0.3);animation:drop-in 0.35s cubic-bezier(0.34,1.5,0.64,1);direction:rtl;}
#flash.crit{border-color:var(--crit);box-shadow:0 0 60px rgba(255,0,60,0.6);animation:drop-in 0.35s cubic-bezier(0.34,1.5,0.64,1),crit-glow 0.8s ease-in-out infinite 0.35s;}
@keyframes drop-in{from{opacity:0;transform:translateX(-50%) translateY(-14px) scale(0.92)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes crit-glow{0%,100%{box-shadow:0 0 60px rgba(255,0,60,0.5)}50%{box-shadow:0 0 100px rgba(255,0,60,0.85)}}
.flash-title{font-size:14px;font-weight:900;color:#fff;margin-bottom:4px;}
.flash-body{font-size:11px;color:var(--text);line-height:1.5;}
.flash-close{position:absolute;top:7px;left:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;}

/* POPUP */
.map-popup{direction:rtl;font-family:'Heebo',sans-serif;background:rgba(2,5,8,0.97);color:#fff;border:1px solid;border-radius:8px;padding:10px 12px;min-width:180px;}
.leaflet-popup-content-wrapper{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;}
.leaflet-popup-tip{display:none!important;}
.leaflet-popup-content{margin:0!important;}

/* LOADING SCREEN */
#loadScreen{position:fixed;inset:0;background:rgba(2,5,8,0.96);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(12px);}
#loadScreen.hide{display:none;}
.ls-radar{width:70px;height:70px;border-radius:50%;border:2px solid rgba(0,207,255,0.15);position:relative;}
.ls-radar::after{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,rgba(0,207,255,0.9) 50deg,transparent 50deg);animation:radar 1.5s linear infinite;}
.ls-txt{font-size:11px;color:var(--accent);font-family:var(--mono);letter-spacing:3px;}
.ls-log{display:flex;flex-direction:column;gap:5px;direction:rtl;text-align:right;}
.ls-line{font-size:10px;color:var(--dim);font-family:var(--mono);display:flex;gap:6px;opacity:0;animation:fade-in-line 0.3s ease forwards;}
@keyframes fade-in-line{to{opacity:1;color:var(--text);}}

/* NOTE BOX */
.note-box{margin:8px 10px;background:rgba(200,130,0,0.07);border:1px solid rgba(200,130,0,0.2);border-radius:5px;padding:7px 9px;font-size:9px;color:#cc9900;line-height:1.6;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px;color:var(--dim);}
.empty-icon{font-size:32px;opacity:0.3;}
</style>
</head>
<body>

<!-- FLASH BANNER -->
<div id="flash">
  <button class="flash-close" onclick="closeFlash()">✕</button>
  <div class="flash-title" id="flashTitle"></div>
  <div class="flash-body" id="flashBody"></div>
</div>

<!-- LOADING SCREEN -->
<div id="loadScreen">
  <div class="ls-radar"></div>
  <div class="ls-txt" id="lsTxt">INITIALIZING...</div>
  <div class="ls-log" id="lsLog"></div>
</div>

<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-row1">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-radar">
        <div class="lr-ring"></div><div class="lr-ring2"></div>
        <div class="lr-sweep"></div><div class="lr-dot"></div>
      </div>
      <div class="logo-txt">
        <h1>מרכז מודיעין לאומי</h1>
        <div class="sub">ISRAEL INTEL HUB · 24/7 · FLASH SCAN</div>
      </div>
    </div>

    <!-- THREAT MATRIX -->
    <div class="threat-matrix" id="threatMatrix">
      <!-- Populated by JS -->
    </div>

    <!-- READINESS -->
    <div class="readiness-compact">
      <div class="rc-label">כוננות</div>
      <div class="rc-bars" id="rcBars">
        <div class="rc-bar" id="rb1"></div><div class="rc-bar" id="rb2"></div>
        <div class="rc-bar" id="rb3"></div><div class="rc-bar" id="rb4"></div>
        <div class="rc-bar" id="rb5"></div>
      </div>
      <div class="rc-score" id="rcScore" style="color:var(--green)">--</div>
      <div class="rc-level" id="rcLevel" style="color:var(--green)">--</div>
    </div>

    <!-- RIGHT -->
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="clock" id="clock">00:00:00</div>
      <button class="btn danger" id="scanBtn" onclick="flashScan()">⚡ סרוק</button>
      <button class="btn" id="autoBtn" onclick="toggleAuto()">🔄 אוטו: OFF</button>
      <button class="btn" id="notifBtn" onclick="toggleNotif()">🔔</button>
      <div class="next-scan-lbl" id="nextLbl">--</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <!-- SOURCES ROW -->
  <div class="sources-row" id="sourcesRow"></div>
</div>

<!-- TICKER -->
<div class="ticker" id="ticker">
  <span class="ticker-lbl">⚡ בזק</span>
  <div class="ticker-track"><div class="ticker-inner" id="tickerInner">טוען...</div></div>
</div>

<!-- BODY -->
<div class="body-wrap">

  <!-- MAP -->
  <div id="map"></div>

  <!-- MAP LEGEND -->
  <div class="map-legend">
    <div class="ml-title">רמת סיכון אזורי</div>
    <div class="ml-row"><div class="ml-dot" style="background:rgba(0,255,136,0.5)"></div>שגרה</div>
    <div class="ml-row"><div class="ml-dot" style="background:rgba(136,255,0,0.5)"></div>עירנות</div>
    <div class="ml-row"><div class="ml-dot" style="background:rgba(255,221,0,0.5)"></div>כוננות</div>
    <div class="ml-row"><div class="ml-dot" style="background:rgba(255,136,0,0.5)"></div>אזהרה</div>
    <div class="ml-row"><div class="ml-dot" style="background:rgba(255,0,60,0.5)"></div>חירום</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="stabs">
      <div class="stab active" onclick="stab('regions',this)">🗺</div>
      <div class="stab" onclick="stab('alerts',this)">⚡</div>
      <div class="stab" onclick="stab('diplo',this)">🌐</div>
      <div class="stab" onclick="stab('traj',this)">🚀</div>
      <div class="stab" onclick="stab('sources',this)">📡</div>
    </div>

    <div class="tcontent active" id="tc-regions"></div>
    <div class="tcontent" id="tc-alerts"><div class="empty-state"><div class="empty-icon">⚡</div><div style="font-size:11px">לחץ סרוק</div></div></div>
    <div class="tcontent" id="tc-diplo"></div>
    <div class="tcontent" id="tc-traj"><div class="empty-state"><div class="empty-icon">🚀</div><div style="font-size:11px">אין מסלולים פעילים</div></div></div>
    <div class="tcontent" id="tc-sources"></div>
  </div>

</div><!-- /body-wrap -->
</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════════════
const API = 'https://api.anthropic.com/v1/messages';
const FAST_INTERVAL = 60000;  // 60s auto-scan
let map, polyLayers={}, trajLayers=[], notifOn=false, autoOn=false;
let autoTimer=null, nextAt=null, isLoading=false, scanN=0, prevLevel=0;
let allAlerts=[], allRegions=[], allTraj=[], allDiplo=[];

// ── LEVEL CONFIG ─────────────────────────────────────────────
const LVL={
  1:{c:'#00ff88',label:'שגרה'},
  2:{c:'#7fff00',label:'עירנות'},
  3:{c:'#ffdd00',label:'כוננות'},
  4:{c:'#ff8800',label:'אזהרה'},
  5:{c:'#ff003c',label:'חירום'},
};
const rC=(r)=>LVL[Math.min(5,Math.max(1,Math.round(r)))]?.c||'#00ff88';
const rBg=(r,a=0.22)=>rC(r).replace('#','rgba(').replace(/([0-9a-f]{2})/gi,(_,h)=>parseInt(h,16)+',').replace(/,$/,`,${a})`).replace('rgba(','rgba(').slice(0,-1)+'rgba('.length;

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── THREAT ACTORS ─────────────────────────────────────────────
const THREATS=[

function popupHtml(r,risk){

  const c=LVL[lv].c,sc=Math.round(risk*20);
  return `<div class="map-popup" style="border-color:${c}">
    <div style="font-size:13px;font-weight:900;color:#fff;margin-bottom:4px">${r.name}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-family:'Share Tech Mono',monospace;font-size:20px;color:${c};font-weight:900">${sc}</div>
      <div><div style="font-size:10px;color:${c};font-weight:700">רמה ${lv} — ${LVL[lv].label}</div>
      <div style="font-size:9px;color:#446">${r.note||''}</div></div>
    </div>
    <div style="display:flex;gap:3px;flex-wrap:wrap">${(r.threats||[]).map(t=>`<span style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:1px 4px;font-size:8px;color:#778">${t}</span>`).join('')}</div>
  </div>`;
}

function updatePoly(id,risk){
  const poly=polyLayers[id];if(!poly)return;
  const lv=Math.min(5,Math.max(1,risk));
  poly.setStyle({color:rC(lv),fillColor:hexToRgba(rC(lv),0.18),fillOpacity:lv>=4?0.52:0.35,dashArray:lv>=4?null:'5,4',weight:lv>=4?2.5:1.5});
  const r=REGIONS.find(x=>x.id===id);
  if(r){r.risk=lv;poly.setPopupContent(popupHtml({...r,risk:lv},lv));}
}

// ── TRAJECTORIES ─────────────────────────────────────────────
function clearTraj(){trajLayers.forEach(l=>{try{map.removeLayer(l);}catch(e){}});trajLayers=[];}

function drawTraj(t){
  const pts=arcPts(t.origin,t.impact,10);
  const line=L.polyline(pts,{color:'#ff4400',weight:2,dashArray:'5,4',opacity:0.8}).addTo(map);
  trajLayers.push(line);

  const oI=L.divIcon({html:`<div style="width:12px;height:12px;background:${t.fromColor||'#ff8800'};border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px ${t.fromColor||'#ff8800'}"></div>`,className:'',iconAnchor:[6,6]});
  const oM=L.marker(t.origin,{icon:oI}).addTo(map).bindTooltip(`🚀 ${t.sourceName}`,{direction:'top'});
  trajLayers.push(oM);

  const impC=L.circle(t.impact,{radius:t.impactRadius||7000,color:'#ff0000',fillColor:'rgba(255,0,0,0.1)',weight:1.5,dashArray:'3,4'}).addTo(map);
  trajLayers.push(impC);

  if(t.intercept){
    const iM=L.marker(t.intercept,{icon:L.divIcon({html:`<div style="font-size:18px;filter:drop-shadow(0 0 6px #00ff88)">💥</div>`,className:'',iconAnchor:[9,9]})}).addTo(map).bindTooltip('🛡️ יירוט',{direction:'top'});
    trajLayers.push(iM);
    const iL=L.polyline([t.origin,t.intercept],{color:'#00ff88',weight:1.5,dashArray:'3,5',opacity:0.6}).addTo(map);
    trajLayers.push(iL);
  }

  const dM=L.marker(t.impact,{icon:L.divIcon({html:`<div style="font-size:18px">🎯</div>`,className:'',iconAnchor:[9,9]})}).addTo(map).bindTooltip(`🎯 ${t.targetName}`,{direction:'top'});
  trajLayers.push(dM);
}

function arcPts(a,b,n){const pts=[];const ml=(a[0]+b[0])/2+1.2,ml2=(a[1]+b[1])/2;for(let i=0;i<=n;i++){const t=i/n;pts.push([(1-t)*(1-t)*a[0]+2*(1-t)*t*ml+t*t*b[0],(1-t)*(1-t)*a[1]+2*(1-t)*t*ml2+t*t*b[1]]);}return pts;}

  }).join('');
}

function flyTo(id){
  const r=REGIONS.find(x=>x.id===id);
  if(r){map.flyTo(r.center,9,{duration:1});stab('regions',document.querySelectorAll('.stab')[0]);}
}

function renderAlerts(){
  const el=document.getElementById('tc-alerts');
  if(!allAlerts.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">⚡</div><div style="font-size:11px">אין התראות</div></div>';return;}
  const sorted=[...allAlerts].sort((a,b)=>{
    if(a.earlyWarning&&!b.earlyWarning)return -1;if(!a.earlyWarning&&b.earlyWarning)return 1;
    const o={critical:0,high:1,warning:2,medium:3,low:4};return(o[a.severity]??5)-(o[b.severity]??5)||b.timestamp-a.timestamp;
  });
  el.innerHTML=sorted.map(a=>{
    const t=new Date(a.timestamp).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    return `<div class="al-item" style="border-right-color:${SEV_C[a.severity]||'#334'}">
      <div class="al-head">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${a.earlyWarning?'<span class="ew-pill">⚡ אזהרה מוקדמת</span>':''}
          <span class="al-src" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:${SEV_C[a.severity]||'#556'}">${SRC_LABELS[a.source]||a.source}</span>
        </div>
        <span class="al-time">${t}</span>
      </div>
      <div class="al-title">${a.title}</div>
      <div class="al-body">${a.body}</div>
      <div class="al-foot">
        <div style="display:flex;gap:3px;flex-wrap:wrap">${(a.tags||[]).map(tg=>`<span class="tag-mini">${tg}</span>`).join('')}</div>
        <div class="conf-wrap"><div class="conf-bar"><div class="conf-fill" style="width:${a.confidence||70}%"></div></div>${a.confidence||70}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderDiplo(data){
  const countries=data?.length?data:DIPLO_INIT;
  const el=document.getElementById('tc-diplo');
  const REL_COLORS={שלום:'#2255aa',שלום_קר:'#3366aa','שלום קר':'#3366aa',עוינות:'#aa3322',אויב:'#dd0000',מלחמה:'#ff0022',מתח:'#aa5500','נורמליזציה?':'#7744aa',אברהם:'#22aa66'};
  el.innerHTML=countries.map(c=>{
    const rc=c.relColor||REL_COLORS[c.rel]||'#446';
    const ti=c.trend==='up'?'↑':'up'?'↑':c.trend==='down'?'↘':'→';
    const tc_color=c.trend==='up'||c.trend==='up'?'#ff4444':c.trend==='down'?'#44ff88':'#666';
    return `<div class="diplo-country">
      <div class="dc-head">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="dc-flag">${c.flag}</span>
          <span class="dc-name">${c.name}</span>
        </div>
        <span class="dc-rel" style="color:${rc};border-color:${rc}33;background:${rc}11">${c.rel}</span>
      </div>
      <div class="dc-status">${c.status_live||c.status}</div>
      <div class="dc-trend">
        <span style="font-size:10px;color:var(--dim)">מגמה:</span>
        <span style="color:${tc_color};font-size:14px">${c.trendIcon||ti}</span>
        <span style="font-size:9px;color:${tc_color}">${c.trendLabel||({up:'הידרדרות',down:'שיפור',stable:'יציב'}[c.trend]||'יציב')}</span>
      </div>
      ${c.alert?`<div style="margin-top:5px;background:rgba(255,68,0,0.1);border:1px solid rgba(255,68,0,0.25);border-radius:4px;padding:4px 7px;font-size:9px;color:var(--orange)">⚠️ ${c.alert}</div>`:''}
    </div>`;
  }).join('');
}

function renderTraj(){
  const el=document.getElementById('tc-traj');
  if(!allTraj.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🚀</div><div style="font-size:11px">אין מסלולים פעילים</div></div>';return;}
  el.innerHTML=allTraj.map(t=>`
    <div class="traj-card">
      <div class="tc-head">
        <span style="font-size:16px">${{rocket:'🚀',missile:'🚀',uav:'✈️',ballistic:'🎯',drone:'🛸'}[t.type]||'🚀'}</span>
        <span class="tc-type">${t.sourceName} ➜ ${t.targetName}</span>
      </div>
      <div class="tc-grid">
        <div><div class="tcg-k">סוג</div><div class="tcg-v">${t.type}</div></div>
        <div><div class="tcg-k">הסתברות</div><div class="tcg-v">${t.probability}%</div></div>
        <div><div class="tcg-k">זמן טיסה</div><div class="tcg-v">${t.flightTimeSec}s</div></div>
        <div><div class="tcg-k">רדיוס</div><div class="tcg-v">${((t.impactRadius||5000)/1000).toFixed(1)}km</div></div>
      </div>
      ${t.note?`<div style="font-size:9px;color:var(--dim);margin-top:5px">${t.note}</div>`:''}
      ${t.intercept?'<div style="font-size:9px;color:var(--green);margin-top:3px">🛡️ יירוט צפוי — כיפת ברזל</div>':''}
    </div>`).join('');
}

function renderTicker(){
  const items=allAlerts.filter(a=>a.earlyWarning||a.severity==='critical'||a.severity==='high').slice(0,10);
  if(!items.length)return;
  const bar=document.getElementById('ticker');bar.classList.add('show');
  const d=[...items,...items];
  document.getElementById('tickerInner').innerHTML=d.map(a=>`<span>${a.earlyWarning?'⚡':''} ${a.title}</span><span style="color:var(--red);padding:0 16px">◆</span>`).join('');
}

let stepDelay=0;
function lsLog(txt,done=false){
  stepDelay+=120;
  setTimeout(()=>{
    const line=document.createElement('div');
    line.className='ls-line';
    line.style.animationDelay='0s';
    line.innerHTML=`<span style="color:${done?'#00ff88':'#00cfff'}">${done?'✓':'>_'}</span> ${txt}`;
    document.getElementById('lsLog').appendChild(line);
  },stepDelay);
}

function setSrcSearching(){
  document.querySelectorAll('.src-chip').forEach(el=>{el.classList.add('searching');});
}
function setSrcDone(counts={}){
  SOURCES.forEach(s=>{
    const el=document.getElementById('sc-'+s.id);
    if(el){el.classList.remove('searching');const cnt=counts[s.id]||0;const span=el.querySelector('span');if(span)span.textContent=cnt;}
  });
}

// ═══════════════════════════════════════════════════════════════
// MAIN FLASH SCAN
// ═══════════════════════════════════════════════════════════════
async function flashScan(){
  if(isLoading)return;
  isLoading=true;
  scanN++;
  const btn=document.getElementById('scanBtn');
  btn.disabled=true;btn.textContent='⏳';
  setSrcSearching();
  prog(3);
  stepDelay=0;

  const SYSTEM=`אתה מערכת מודיעין ביטחונית ישראלית מהדרג הראשון. ביצוע סריקה מהירה ומקיפה.

אזורים לניתוח:
${REGIONS.map(r=>`${r.id}:${r.name}(${r.threats.join(',')})`).join(' | ')}

גורמי איום:
- iran (איראן): תוכנית גרעין, פרוקסי, תקיפות ישירות
- hamas (חמאס): ירי עזה, פעילות מחו"ל, תגמול
- hizb (חיזבאללה): צפון, לבנון, טילי דיוק
- houthi (חות'יים): UAV תימן, טילים, שיט
- syria (סוריה): מיליציות, חיכוך גבול
- new (מדינות חדשות): האם מצטרפות לציר?

מקורות לסרוק במהירות (כולם):
1. oref - פיקוד העורף: אזעקות, התראות, tzeva_adom
2. il - ישראל: ynet, haaretz, n12, kan11, walla, maariv  
3. world - Reuters, AP, BBC, CNN, NYT, WaPo
4. aljazeera - אל ג'זירה (ערבית + אנגלית)
5. arabic_tg - ערוצי טלגרם ערביים: @QudsNow @gazatoday2023 @AJArabic @almanarnews @HamasInfoBank @SarayaPress @Brigades_Qassam
6. idf - דובר IDF, COGAT
7. police_tg - ערוצי משטרה/גבול ציבוריים, @israelipolice
8. intel_tg - @WarMonitor3 @IntelCrab @OSINTdefender @ELINT_news @IsraeliSecurity
9. mda - מגן דויד אדום ציבורי, כיבוי אש
10. x_intel - X/Twitter: @BNONews @WarMonitor @IDF @IsraeliPM @Haaretz @YnetNews
11. municip - עיריות ישראל פייסבוק ציבורי: "נפילה" "פגיעה" "אירוע"
12. border_gd - משמר הגבול, שב"כ הצהרות ציבוריות

אותות אזהרה מוקדמת:
- "shelling", "rockets", "sirens", "launch" / "ירי","שיגור","אזעקה"
- "troop movement", "mobilization" / "ניוד","כוננות"
- "emergency meeting", "war cabinet" / "קבינט מלחמה","ישיבת חירום"  
- ביטויים ערביים: إطلاق صاروخ, إنذار, عملية, قصف, شهاب, مدافع القسام
- "new country" joining conflict / מדינה חדשה מצטרפת
- "Iran direct attack" / "תקיפה איראנית ישירה"

מצב דיפלומטי שכנות:
בחן: מצרים, ירדן, סעודיה, איחוד האמירויות, סוריה, לבנון, טורקיה, עיראק, תימן, מרוקו, בחריין

החזר JSON בלבד (ללא backticks, ללא טקסט נוסף):
{
  "readinessLevel": 1-5,
  "readinessScore": 10-100,
  "readinessReason": "הסבר מפורט בעברית",
  "threats": [
    { "id": "iran|hamas|hizb|houthi|syria|new", "score": 0-100, "label": "תיאור קצר" }
  ],
  "regions": [
    { "id": "region_id", "risk": 1.0-5.0, "note": "הסבר" }
  ],
  "alerts": [
    {
      "id": "a1",
      "title": "כותרת",
      "body": "2-4 משפטים",
      "source": "oref|il|world|aljazeera|arabic_tg|idf|police_tg|intel_tg|mda|x_intel|municip|border_gd",
      "severity": "critical|high|warning|medium|low",
      "earlyWarning": true/false,
      "affectedRegions": ["id"],
      "confidence": 0-100,
      "tags": ["תג"],
      "timestamp": <unix ms>
    }
  ],
  "trajectories": [
    {
      "id": "t1", "type": "rocket|missile|uav|ballistic|drone",
      "sourceName": "שם", "targetName": "שם",
      "origin": [lat,lng], "impact": [lat,lng],
      "intercept": [lat,lng],
      "impactRadius": 5000,
      "fromColor": "#hex",
      "probability": 0-100,
      "flightTimeSec": 60,
      "note": "הערה"
    }
  ],
  "diplomatic": [
    {
      "id": "egypt|jordan|saudi|uae|bahrain|syria|lebanon|iran|turkey|morocco|iraq|yemen",
      "flag": "🇪🇬",
      "name": "שם",
      "rel": "סטטוס",
      "relColor": "#hex",
      "trend": "up|down|stable",
      "trendIcon": "↑|↘|→",
      "trendLabel": "הידרדרות|שיפור|יציב",
      "status_live": "עדכון עכשווי בעברית",
      "alert": "אם יש התפתחות חריגה"
    }
  ],
  "sourceCounts": { "oref":0,"il":0,"world":0,"aljazeera":0,"arabic_tg":0,"idf":0,"police_tg":0,"intel_tg":0,"mda":0,"x_intel":0,"municip":0,"border_gd":0 }
}`;

  try{
    prog(10);
    const resp=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4096,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:SYSTEM,
        messages:[{role:'user',content:`סריקת פלאש מלאה — ${new Date().toLocaleString('he-IL')}.

בצע חיפושים מהירים ומקבילים:
1. "Israel war latest news" ${new Date().toLocaleDateString('en')}
2. "ישראל חדשות ביטחוניות" "אזעקה" "ירי" "יירוט" "שיגור"
3. "Hezbollah rockets Lebanon Israel" OR "Hamas Gaza strikes"
4. "Iran Israel threat" OR "Houthis drone attack"
5. "פיקוד העורף" "tzeva_adom" OR "Color Red" alert today
6. "حزب الله هجوم" OR "كتائب القسام" OR "الحوثيون إسرائيل" (ערבי)
7. "IDF strike" OR "Israel army operation" latest
8. "Israel diplomacy Jordan Egypt" OR "normalization" latest
9. site:t.me OR telegram "Israel war" "Gaza" latest public
10. "נפילה" "ישראל" "עיריית" OR "כיבוי אש" היום
11. "new country" "join" "conflict Israel" OR "ally Hamas Hezbollah"
12. "Israel relations" "Turkey" OR "Iraq" OR "Yemen" latest

ספק ניתוח מלא. החזר JSON בלבד.`}]
      })
    });
    prog(70);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    prog(85);

    let raw='';
    for(const b of(data.content||[])){if(b.type==='text')raw+=b.text;}
    raw=raw.trim().replace(/^```json?\n?/,'').replace(/\n?```$/,'');

    const parsed=JSON.parse(raw);
    prog(95);

    // Readiness
    renderReadiness(parsed.readinessLevel||1,parsed.readinessScore||20);

    // Threat matrix
    renderThreatMatrix(parsed);

    // Regions
    if(parsed.regions?.length){
      allRegions=REGIONS.map(base=>{
        const u=parsed.regions.find(r=>r.id===base.id);
        return{...base,risk:u?.risk||base.baseRisk,note:u?.note||base.note};
      });
    } else {
      allRegions=REGIONS.map(r=>({...r,risk:r.baseRisk}));
    }
    allRegions.forEach(r=>updatePoly(r.id,r.risk));
    renderRegions();

    // Alerts
    const now=Date.now();
    allAlerts=(parsed.alerts||[]).map((a,i)=>({...a,timestamp:a.timestamp||(now-i*15000)}));
    renderAlerts();
    renderTicker();

    // Diplomatic
    if(parsed.diplomatic?.length){allDiplo=parsed.diplomatic;}
    renderDiplo(allDiplo.length?allDiplo:null);

    // Trajectories
    clearTraj();
    if(parsed.trajectories?.length){
      allTraj=parsed.trajectories;
      allTraj.forEach(t=>drawTraj(t));
    } else {allTraj=[];}
    renderTraj();

    // Sources
    setSrcDone(parsed.sourceCounts||{});
    renderSources(parsed.sourceCounts||{});

    // Notifications
    const ews=allAlerts.filter(a=>a.earlyWarning);
    if(ews.length){
      pushNotif(`⚡ ${ews.length} אזהרות מוקדמות`,ews[0].title);
      if(parsed.readinessLevel>=4)showFlash(`🚨 ${ews[0].title}`,ews[0].body,parsed.readinessLevel===5);
    }

    prog(100);
    setTimeout(()=>prog(0),400);

  }catch(err){
    console.error(err);prog(0);
    document.getElementById('tc-alerts').innerHTML=`<div style="margin:10px;background:rgba(255,0,0,0.07);border:1px solid rgba(255,0,0,0.2);border-radius:5px;padding:10px;font-size:10px;color:#ff8888">⚠️ ${err.message}</div>`;
    setSrcDone();
  }finally{
    isLoading=false;
    btn.disabled=false;btn.textContent='⚡ סרוק';
  }
}

  await flashScan();

  // Auto-start auto mode
